<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <marker id="arrow-err" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b91c1c"/>
    </marker>
    <linearGradient id="adapterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="resGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
  </defs>

  <!-- title -->
  <text x="550" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Faker LLM — architecture</text>
  <text x="550" y="56" text-anchor="middle" font-size="13" fill="#6b7280">Hexagonal: provider-agnostic core + thin adapters. New provider = new adapter.</text>

  <!-- ============ Client side ============ -->
  <g>
    <rect x="40" y="90" width="160" height="60" rx="8" fill="#fff" stroke="#374151" stroke-width="1.5"/>
    <text x="120" y="118" text-anchor="middle" font-weight="600">HTTP client</text>
    <text x="120" y="138" text-anchor="middle" font-size="11" fill="#6b7280">curl / k6 / app</text>
  </g>

  <!-- ============ Ktor / Netty layer ============ -->
  <g>
    <rect x="240" y="80" width="820" height="610" rx="10" fill="#f9fafb" stroke="#9ca3af" stroke-dasharray="4 3"/>
    <text x="250" y="100" font-weight="600" fill="#374151">Ktor 3.5.0 + Netty (Application.module)</text>
  </g>

  <!-- Routes -->
  <g>
    <rect x="260" y="120" width="170" height="80" rx="6" fill="url(#adapterGrad)" stroke="#1e3a8a"/>
    <text x="345" y="142" text-anchor="middle" font-weight="600">openAiRoutes</text>
    <text x="345" y="160" text-anchor="middle" font-size="11" fill="#1e3a8a">POST /v1/chat/completions</text>
    <text x="345" y="178" text-anchor="middle" font-size="11" fill="#1e3a8a">stream + non-stream</text>
    <text x="345" y="194" text-anchor="middle" font-size="11" fill="#1e3a8a">+ tool_calls + reasoning</text>
  </g>

  <g>
    <rect x="450" y="120" width="170" height="80" rx="6" fill="url(#adapterGrad)" stroke="#1e3a8a"/>
    <text x="535" y="142" text-anchor="middle" font-weight="600">anthropicRoutes</text>
    <text x="535" y="160" text-anchor="middle" font-size="11" fill="#1e3a8a">POST /v1/messages</text>
    <text x="535" y="178" text-anchor="middle" font-size="11" fill="#1e3a8a">multi-event SSE</text>
    <text x="535" y="194" text-anchor="middle" font-size="11" fill="#1e3a8a">+ thinking + tool_use</text>
  </g>

  <g>
    <rect x="640" y="120" width="140" height="80" rx="6" fill="#f3f4f6" stroke="#6b7280"/>
    <text x="710" y="142" text-anchor="middle" font-weight="600">healthRoute</text>
    <text x="710" y="160" text-anchor="middle" font-size="11" fill="#374151">GET /healthz</text>
    <text x="710" y="178" text-anchor="middle" font-size="11" fill="#374151">→ "ok"</text>
  </g>

  <g>
    <rect x="800" y="120" width="240" height="80" rx="6" fill="#fee2e2" stroke="#b91c1c"/>
    <text x="920" y="142" text-anchor="middle" font-weight="600">StatusPages handler</text>
    <text x="920" y="160" text-anchor="middle" font-size="11" fill="#7f1d1d">EmptyPoolException → 500</text>
    <text x="920" y="176" text-anchor="middle" font-size="11" fill="#7f1d1d">SerializationException → 400</text>
    <text x="920" y="192" text-anchor="middle" font-size="11" fill="#7f1d1d">envelope dispatch by path</text>
  </g>

  <!-- arrows from client -->
  <line x1="200" y1="135" x2="258" y2="160" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="145" x2="448" y2="160" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ Adapter inner layer ============ -->
  <g>
    <rect x="260" y="225" width="360" height="110" rx="6" fill="#eff6ff" stroke="#1e40af"/>
    <text x="440" y="244" text-anchor="middle" font-weight="600" fill="#1e40af">Adapter inner (OpenAI / Anthropic)</text>
    <text x="440" y="264" text-anchor="middle" font-size="11" fill="#1e40af">DTO (Request/Response/Chunk/Error) + Json + Mappers</text>
    <line x1="270" y1="278" x2="610" y2="278" stroke="#1e40af" stroke-dasharray="2 2"/>
    <text x="280" y="294" font-size="11" fill="#1e3a8a">• receiveText → decode → RequestMapper.toContext</text>
    <text x="280" y="310" font-size="11" fill="#1e3a8a">• ResponseMapper.buildNonStreaming / streamSse (Writer)</text>
    <text x="280" y="326" font-size="11" fill="#1e3a8a">• respondText / respondTextWriter (NO ContentNegotiation)</text>
  </g>

  <!-- ============ Core layer ============ -->
  <g>
    <rect x="260" y="365" width="780" height="190" rx="8" fill="url(#coreGrad)" stroke="#92400e" stroke-width="1.5"/>
    <text x="650" y="386" text-anchor="middle" font-weight="700" fill="#92400e">Provider-agnostic core</text>
  </g>

  <!-- routing -->
  <g>
    <rect x="280" y="400" width="200" height="135" rx="6" fill="#fff" stroke="#92400e"/>
    <text x="380" y="420" text-anchor="middle" font-weight="600">routing</text>
    <text x="290" y="442" font-size="11">CompositeRequestRouter</text>
    <text x="290" y="458" font-size="11">PromptDirectivePolicy</text>
    <text x="290" y="478" font-size="10" fill="#6b7280">Scans inspectableContent for</text>
    <text x="290" y="492" font-size="10" fill="#6b7280">[[faker:force_id/tag/status:...]]</text>
    <text x="290" y="514" font-size="11" font-style="italic" fill="#374151">→ RoutingDecision</text>
  </g>

  <!-- pool -->
  <g>
    <rect x="500" y="400" width="220" height="135" rx="6" fill="#fff" stroke="#92400e"/>
    <text x="610" y="420" text-anchor="middle" font-weight="600">pool</text>
    <text x="510" y="442" font-size="11">PoolLoader (classpath JSON)</text>
    <text x="510" y="458" font-size="11">PoolSelector (weighted pick)</text>
    <text x="510" y="478" font-size="10" fill="#6b7280">filter by RoutingDecision</text>
    <text x="510" y="492" font-size="10" fill="#6b7280">+ applicability (requiresTools)</text>
    <text x="510" y="514" font-size="11" font-style="italic" fill="#374151">→ PoolEntry</text>
  </g>

  <!-- engine -->
  <g>
    <rect x="740" y="400" width="280" height="135" rx="6" fill="#fff" stroke="#92400e"/>
    <text x="880" y="420" text-anchor="middle" font-weight="600">engine</text>
    <text x="750" y="442" font-size="11">DefaultStreamingEngine</text>
    <text x="750" y="458" font-size="11">Chunking · CallIdGenerator</text>
    <text x="750" y="478" font-size="10" fill="#6b7280">cold Flow with suspend delay()</text>
    <text x="750" y="492" font-size="10" fill="#6b7280">TTFT, inter-chunk, mid-stream errors</text>
    <text x="750" y="514" font-size="11" font-style="italic" fill="#374151">→ Flow&lt;AbstractStreamEvent&gt;</text>
  </g>

  <!-- domain (under core) -->
  <g>
    <rect x="280" y="575" width="740" height="100" rx="6" fill="#ecfdf5" stroke="#047857"/>
    <text x="650" y="595" text-anchor="middle" font-weight="700" fill="#047857">domain (pure data, no Ktor / adapter imports)</text>
    <text x="295" y="617" font-size="11">PoolEntry (sealed: SuccessEntry · HttpErrorEntry; discriminator: "kind")</text>
    <text x="295" y="633" font-size="11">ResponsePart (sealed: Text · Thinking · ToolCall; discriminator: "type")</text>
    <text x="295" y="649" font-size="11">AbstractStreamEvent (sealed; runtime-only, not serialized)</text>
    <text x="295" y="665" font-size="11">TimingProfile · RangeMs/RangeInt · UsageStub · FinishReason · ErrorBody · MidStreamError · RequestContext</text>
  </g>

  <!-- ============ Resources side ============ -->
  <g>
    <rect x="40" y="370" width="180" height="180" rx="8" fill="url(#resGrad)" stroke="#047857"/>
    <text x="130" y="390" text-anchor="middle" font-weight="700" fill="#047857">classpath pool</text>
    <text x="130" y="408" text-anchor="middle" font-size="10" fill="#065f46">FAKER_POOL_DIR env-var</text>
    <line x1="50" y1="418" x2="210" y2="418" stroke="#047857" stroke-dasharray="2 2"/>
    <text x="55" y="436" font-size="11" font-weight="600">pool/ (default)</text>
    <text x="55" y="450" font-size="10" fill="#065f46">26 entries, 8 files</text>
    <text x="55" y="464" font-size="10" fill="#065f46">incl. 5% http_error</text>
    <text x="55" y="478" font-size="10" fill="#065f46">+ 5% mid_stream_error</text>
    <text x="55" y="500" font-size="11" font-weight="600">pool-clean/</text>
    <text x="55" y="514" font-size="10" fill="#065f46">18 success only</text>
    <text x="55" y="528" font-size="11" font-weight="600">pool-short-only/</text>
    <text x="55" y="542" font-size="10" fill="#065f46">6 entries (max RPS)</text>
  </g>

  <!-- arrows: routes → adapter inner -->
  <line x1="345" y1="200" x2="345" y2="225" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="535" y1="200" x2="535" y2="225" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- arrows: adapter → core -->
  <line x1="380" y1="335" x2="380" y2="400" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="386" y="368" font-size="10" fill="#4b5563">RequestContext</text>

  <line x1="500" y1="335" x2="555" y2="400" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- arrows: routing → pool → engine -->
  <line x1="480" y1="467" x2="500" y2="467" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="478" y="460" text-anchor="end" font-size="9" fill="#4b5563">decision</text>

  <line x1="720" y1="467" x2="740" y2="467" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="730" y="460" text-anchor="middle" font-size="9" fill="#4b5563">entry</text>

  <!-- arrow: pool → resources -->
  <line x1="500" y1="430" x2="220" y2="430" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
  <text x="350" y="424" text-anchor="middle" font-size="10" fill="#4b5563">load() at startup</text>

  <!-- arrow: engine → adapter (Flow back) -->
  <path d="M 880 400 Q 880 365 760 365 Q 620 365 620 335" stroke="#4b5563" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="780" y="358" text-anchor="middle" font-size="10" fill="#4b5563">Flow&lt;AbstractStreamEvent&gt;</text>

  <!-- arrow: HttpErrorEntry shortcut -->
  <path d="M 610 535 Q 610 545 670 545" stroke="#b91c1c" stroke-width="1.5" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow-err)"/>
  <path d="M 670 545 Q 770 545 770 250 Q 770 230 800 175 L 805 162" stroke="#b91c1c" stroke-width="1.5" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow-err)"/>
  <text x="800" y="540" font-size="10" fill="#b91c1c">HttpErrorEntry: skip engine,</text>
  <text x="800" y="554" font-size="10" fill="#b91c1c">adapter responds directly</text>

  <!-- footer -->
  <text x="550" y="730" text-anchor="middle" font-size="11" fill="#6b7280">SSE wire format: respondTextWriter(ContentType.Text.EventStream) — NOT ktor-server-sse plugin (POST + raw event:error required)</text>
  <text x="550" y="750" text-anchor="middle" font-size="11" fill="#6b7280">Architectural invariant: domain has zero imports from io.ktor.* or com.faker.llm.adapter.*</text>
  <text x="550" y="768" text-anchor="middle" font-size="10" fill="#9ca3af">v0.1.0 · Kotlin 2.3.21 · Ktor 3.5.0 · JDK 21 toolchain</text>
</svg>
