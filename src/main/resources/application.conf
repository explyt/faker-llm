ktor {
  deployment {
    port = 8080
    port = ${?PORT}

    # SSE-стримы для deepseek-пула живут 5-10+ секунд, и flush-каждого-чанка под
    # high-concurrency может на пике упереться в дефолтный timeout=10s -> Netty
    # рвёт коннект с ChannelWriteException, клиент видит таймаут.
    # Поднимаем до 120s — это потолок для нашего самого долгого стрима (massive_reasoning).
    responseWriteTimeoutSeconds = 120
    responseWriteTimeoutSeconds = ${?FAKER_RESPONSE_WRITE_TIMEOUT_SECONDS}

    # SSE-клиенты могут долго не слать ничего на сервер после initial request —
    # явно ставим 0 (infinite) чтобы не плодить лишних reads timeouts.
    requestReadTimeoutSeconds = 0

    # TCP keep-alive чтобы вычищать застрявшие коннекты, которые клиент уже бросил
    # без FIN (стандартная история под нагрузкой). Период — sysctl уровня ОС.
    tcpKeepAlive = true
  }
  application {
    modules = [ com.faker.llm.MainKt.module ]
  }
}
